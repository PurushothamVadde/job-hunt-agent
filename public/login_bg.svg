<svg width="1200" height="900" viewBox="0 0 1200 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .main  { font-family: Inter, system-ui, -apple-system, sans-serif; font-size: 96px; font-weight: 800; fill: #ff1264; letter-spacing: -2px; }
      .ai    { fill: #ff1264; }
      .sub   { font-family: Inter, system-ui, -apple-system, sans-serif; font-size: 18px; font-weight: 600; fill: #ff6e9e; letter-spacing: 10px; text-transform: uppercase; }
      .tag   { font-family: Inter, system-ui, -apple-system, sans-serif; font-size: 14px; font-weight: 400; fill: #8a4060; letter-spacing: 1px; }
    </style>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.6"/>
    </filter>
  </defs>

  <rect width="100%" height="100%" fill="#1a1a1a"/>

  <g text-anchor="middle" filter="url(#shadow)">
    <text x="600" y="420" class="main">JobHunt<tspan class="ai">AI</tspan></text>
    <text x="600" y="462" class="sub">Persistent Agent</text>
  </g>

  <text x="600" y="510" text-anchor="middle" class="tag">
    Upload once · Tailor everywhere · Apply with confidence
  </text>
</svg>
